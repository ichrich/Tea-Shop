services:
  - type: web
    name: sad-tishiny
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_ENABLED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
