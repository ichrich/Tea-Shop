server {
    listen 80;
    client_max_body_size 50M;
    server_name xn----ltbdbcbjwgc7b.xn--p1ai www.xn----ltbdbcbjwgc7b.xn--p1ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    client_max_body_size 50M;
    server_name xn----ltbdbcbjwgc7b.xn--p1ai www.xn----ltbdbcbjwgc7b.xn--p1ai;

    # Фронтенд (React/HTML)
    root /var/www/tea-template/front/;
    index index.html index.htm;

    # SSL сертификаты
    ssl_certificate /etc/ssl/tea-template/certificate.crt;
    ssl_certificate_key /etc/ssl/tea-template/tea-template.key;
    ssl_trusted_certificate /etc/ssl/tea-template/certificate_ca.crt;

    # Отдача фронта
    location / {
        try_files $uri /index.html;
    }
    
    location /admin 
    {
        return 301 /admin/;
    }
    # Админка
    location /admin/ {
        alias /var/www/tea-template/adminPanel/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API на Node
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
